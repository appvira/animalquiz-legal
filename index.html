<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Quiz! — Legal</title>
  <meta name="description" content="Legal documents for Animal Quiz! by APPVIRA LLC.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF9F0;
      --coral: #FF6B6B;
      --text: #444444;
      --muted: #AAAAAA;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px;
      text-align: center;
    }
    h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      color: var(--coral);
      font-size: 42px;
      margin: 0 0 8px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 40px;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-card {
      display: block;
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .link-card .arrow { color: var(--coral); float: right; }
    footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animal Quiz!</h1>
    <div class="subtitle">APPVIRA LLC</div>

    <div class="links">
      <a class="link-card" href="privacy-policy.html">Privacy Policy <span class="arrow">&rarr;</span></a>
      <a class="link-card" href="terms.html">Terms of Service <span class="arrow">&rarr;</span></a>
    </div>

    <footer>
      &copy; 2026 APPVIRA LLC. All rights reserved.
    </footer>
  </div>
</body>
</html>
